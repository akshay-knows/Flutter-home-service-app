name: online_thekedaar
description: Online Thekedaar - Expert Home Services App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.1"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  animate_do: ^3.3.4
  scrollable_positioned_list: ^0.3.8
  geolocator: 13.0.4
  shared_preferences: 2.3.5
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
